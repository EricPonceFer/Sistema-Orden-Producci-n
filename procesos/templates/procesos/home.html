{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Sidebar</title>
        <link rel="stylesheet" href="{% static 'css/sidebar.css' %}">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    </head>
    <body class="dark-theme">
        <!-- Site Navbar -->
        <nav class="site-nav">
            <button class="sidebar-toggle">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </nav>
        <div class="container">
            <aside class="sidebar collapsed">
                <!-- Sidebar header-->
                <header class="sidebar-header">
                    <img src="{% static 'resource/levapan-logo.png' %}" alt="Levapan" class="header-logo">
                    <button class="sidebar-toggle">
                        <span class="material-symbols-outlined">chevron_left</span>
                    </button>
                </header>
                <!-- Sidebar content -->
                <div class="sidebar-content">
                    <!-- Menu   List -->
                    <ul class="menu-list">
                        <li class="menu-item">
                            <a href="#" class="menu-link active">
                                <span class="material-symbols-outlined">Assignment</span>
                                <span class="menu-label">Orden Proceso Producto</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#" class="menu-link">
                                <span class="material-symbols-outlined">front_loader</span>                            
                                <span class="menu-label">Orden Proceso Granel</span>
                            </a>
                        </li>
                    </ul>
                    
                </div>
                <!-- Sidebar footer -->
                <div class="sidebar-footer">
                    <button class="theme-toggle" aria-label="Cambiar tema">
                        <div class="theme-label">
                            <span class="theme-icon material-symbols-outlined">dark_mode</span>
                            <span class="theme-text">Dark Mode</span>
                        </div>
                        <div class="theme-toggle-track">
                            <div class="theme-toggle-indicator"></div>
                        </div>
                    </button>
                </div>
            </aside>
            <div class="main-content">
                <h1>Bienvenido al Sistema de Gestión de Procesos</h1>
                <p>Selecciona una opción del menú para comenzar.</p>
            </div>
        </div>
        <script src="{% static 'js/sidebar.js' %}"></script>
    </body>
</html>
